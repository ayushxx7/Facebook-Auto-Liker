<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="10" fill="#18191A"/>
  
  <!-- Browser Tab Simulation -->
  <rect x="50" y="50" width="700" height="300" rx="10" fill="#242526" stroke="#3A3B3C"/>
  <rect x="50" y="50" width="700" height="40" rx="10" fill="#3A3B3C"/>
  <circle cx="70" cy="70" r="5" fill="#FF5F56"/>
  <circle cx="90" cy="70" r="5" fill="#FFBD2E"/>
  <circle cx="110" cy="70" r="5" fill="#27C93F"/>
  <text x="350" y="75" fill="#B0B3B8" font-family="Arial" font-size="12">facebook.com</text>

  <!-- Feed Content -->
  <rect x="100" y="110" width="500" height="180" rx="10" fill="#18191A"/>
  <rect x="120" y="130" width="40" height="40" rx="20" fill="#3A3B3C"/>
  <rect x="170" y="135" width="150" height="10" rx="5" fill="#3A3B3C"/>
  <rect x="170" y="155" width="100" height="8" rx="4" fill="#3A3B3C" opacity="0.5"/>

  <!-- Target: Like Button -->
  <rect x="120" y="240" width="80" height="30" rx="15" fill="#2D88FF" opacity="0.2" stroke="#2D88FF" stroke-width="2"/>
  <text x="140" y="260" fill="#2D88FF" font-family="Arial" font-size="12" font-weight="bold">👍 Like</text>

  <!-- Bot Overlay -->
  <rect x="550" y="100" width="200" height="150" rx="10" fill="#000" opacity="0.8" stroke="#00FF00"/>
  <text x="565" y="130" fill="#00FF00" font-family="Courier" font-size="14" font-weight="bold">BOT ACTIVE</text>
  <text x="565" y="160" fill="white" font-family="Courier" font-size="10">Scanning for pattern...</text>
  <text x="565" y="180" fill="#00FF00" font-family="Courier" font-size="10">MATCH: like_btn.png</text>
  <text x="565" y="200" fill="white" font-family="Courier" font-size="10">Action: CLICK(x=160, y=255)</text>

  <!-- Mouse Pointer -->
  <path d="M160 255 L175 270 L170 255 L180 250 Z" fill="white" stroke="black"/>
</svg>
